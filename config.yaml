defaults:
  initial_budget: 10000
  currency: USD
  data_source: YAHOO
  llm_base_url: http://192.168.0.169:8080/v1
  ghostfolio_url: http://192.168.0.12:3333
  news_cache_ttl_minutes: 15
  quote_cache_ttl_seconds: 60
  qdrant_url: http://192.168.0.169:6333

accounts:
  research:
    name: "Daily Research Agent"
    cycle_type: "research"
    cron: "0 14 * * 0-4"        # Mon-Fri 14:00 CET (1.5h before NYSE open at 15:30)
    model: "Nemotron"
    fallback_model: "QWEN3.5"
    max_news_articles: 40
    max_article_chars: 3000
    max_screener_per_source: 15

  weekly_balanced:
    name: "Weekly Balanced"
    ghostfolio_account_id: "0c61c851-1f59-4708-b055-b15a9c3cfb13"
    model: "QWEN3.5"
    fallback_model: "Nemotron"
    broker_cost_model: "ibkr"
    cron: "0 20 * * 6"   # Sunday 20:00
    decision_mode: "rules"
    strategy: "core_satellite"
    strategy_description: "Core-Satellite: 60% ETF core + 30% stock satellites + 10% cash reserve"
    prompt_style: "Balance risk and return. Prefer broad ETF exposure as core, select individual stocks as satellites for alpha."
    preferred_metrics: ["SMA", "RSI", "PE"]
    horizon: "weeks to months"
    risk_profile:
      max_position_pct: 20
      min_cash_pct: 10
      max_trades_per_cycle: 5
      stop_loss_pct: -15
      min_holding_days: 14
      max_sector_exposure_pct: 40
    watchlist:
      - SPY
      - QQQ
      - VTI
      - VOO

  monthly_value:
    name: "Monthly Value"
    ghostfolio_account_id: "0349cba7-f4bd-4b02-b9c2-e0731e3143a9"
    model: "QWEN3.5"
    fallback_model: "Nemotron"
    broker_cost_model: "ibkr"
    cron: "20 20 1 * *"  # 1st of month 20:20 (staggered +20min vs Weekly)
    decision_mode: "rules"
    strategy: "value_investing"
    strategy_description: "Value Investing: 40% ETF + 50% undervalued stocks + 10% cash reserve"
    prompt_style: "Seek undervalued assets with margin of safety. Focus on fundamentals, dividends, and long-term compounding."
    preferred_metrics: ["PE", "PB", "DividendYield", "FCF"]
    horizon: "months to years"
    risk_profile:
      max_position_pct: 15
      min_cash_pct: 10
      max_trades_per_cycle: 3
      stop_loss_pct: -20
      min_holding_days: 30
      max_sector_exposure_pct: 35
    watchlist:
      - VTI
      - SCHD
      - VYM

  daily_momentum:
    name: "Daily Momentum"
    ghostfolio_account_id: "1d035b0e-ba6e-426e-9ed2-67edf4b7b5a6"
    model: "QWEN3.5"
    fallback_model: "Miro_Thinker"
    broker_cost_model: "ibkr"
    cron: "0 18 * * 0-4"  # Mon-Fri 18:00
    decision_mode: "rules"
    strategy: "momentum"
    strategy_description: "Momentum/Swing: 20% ETF + 70% high-momentum stocks + 10% cash reserve"
    prompt_style: "Ride momentum, cut losers fast. Focus on technical breakouts, volume surges, and trend strength."
    preferred_metrics: ["RSI", "MACD", "Volume", "BollingerBands"]
    horizon: "days to weeks"
    risk_profile:
      max_position_pct: 25
      min_cash_pct: 10
      max_trades_per_cycle: 3
      stop_loss_pct: -12           # was -8, less whipsaw
      min_holding_days: 3          # was 1, prevent daily churn
      max_sector_exposure_pct: 50
    rules_params:
      use_fixed_watchlist: true    # NO dynamic screener symbols
      rebalance_interval_days: 7   # weekly, not daily
      min_momentum_score: 45
      sell_score_threshold: 30
      max_positions: 3
    watchlist:
      - SPY
      - QQQ
      - TQQQ
      - SOXL

  options_spreads:
    name: "Wheel Strategy (Qwen)"
    ghostfolio_account_id: "4edf44b5-8181-4df5-84ad-b6cbd275638b"
    model: "QWEN3.5"
    fallback_model: "Nemotron"
    broker_cost_model: "ibkr"
    cron: "20 18 * * 4"  # Friday 18:20 (staggered +20min vs Daily)
    strategy: "wheel"
    strategy_description: "Wheel Strategy: sell cash-secured puts on quality underlyings; if assigned sell covered calls above cost basis"
    prompt_style: "Analyze IV regime and select the best underlyings for premium selling. Use available cash — CSP collateral IS the cash. Prefer stocks under $100 so 1 contract fits the account size."
    preferred_metrics: ["IV", "Delta", "Theta", "RSI", "Trend"]
    horizon: "weeks (DTE 30-45)"
    risk_profile:
      min_cash_pct: 5        # near-zero: CSP collateral uses the cash by design
      max_open_csps: 5
      max_ccs_per_symbol: 2
      csp_target_delta: 0.30
      csp_dte_min: 21
      csp_dte_max: 45
      cc_target_delta: 0.25
      cc_dte_min: 14
      cc_dte_max: 30
      take_profit_pct: 50
      stop_loss_pct: 200     # 200% of premium = stop loss for shorts
      earnings_blackout_days: 5
      min_premium_yield_pct: 5.0  # min monthly yield = premium / (strike*100) * (30/dte) * 100
    watchlist:
      - SPY

  weekly_balanced_nemotron:
