    fallback_model: "Nemotron"
    broker_cost_model: "ibkr"
    cron: "0 19 * * 4"    # Friday 19:00 CET
    strategy: "vertical_spreads"
    strategy_description: "Multi-leg options spreads: iron condors, butterflies, bull/bear call/put spreads for defined-risk income"
    prompt_style: "Select optimal spread structures based on IV skew and directional bias. Use iron condors in neutral markets, butterflies for pinning targets, bull call/bear put spreads for directional plays."
    preferred_metrics: ["IV", "IV_Skew", "Delta", "Theta", "RSI", "Trend"]
    horizon: "weeks (DTE 21-45)"
    risk_profile:
      max_open_spreads: 5
      min_cash_pct: 20
      take_profit_pct: 50
      stop_loss_pct: 50      # close when loss >= 50% of max_loss (was 100% = too late)
      max_spread_width: 10
      target_dte_min: 21
      target_dte_max: 45
    # No hardcoded watchlist — uses research agent's dynamic picks
    watchlist: []

